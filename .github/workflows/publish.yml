name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write   # required for npm provenance (--provenance)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Publish-on-main only fires a release when package.json version changed.
      # If this exact version is already on npm, skip (npm would otherwise reject
      # it and fail the run). Bump the version to cut a new release.
      - name: Check if this version is already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "already published: $NAME@$VER — skipping publish"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "not yet published: $NAME@$VER"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      # ─── Diagnostics: prove which npm identity/registry the publish will use ──
      # (`continue-on-error` so a failing whoami — the usual cause of the
      # misleading "404 — not in this registry" on publish — still surfaces here.)
      - name: Diagnostic — npm whoami
        if: steps.check.outputs.publish == 'true'
        run: npm whoami
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Diagnostic — npm config get registry
        if: steps.check.outputs.publish == 'true'
        run: npm config get registry
        continue-on-error: true

      - name: Build
        if: steps.check.outputs.publish == 'true'
        run: npm run build

      - name: Publish
        if: steps.check.outputs.publish == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
